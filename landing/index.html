<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turns</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d10;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    h1 { font-size: 5rem; color: #e63946; letter-spacing: 0.2em; }
    p  { color: #888; margin-top: 1rem; font-size: 1.1rem; }
    a.play {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 1rem 3rem;
      background: #e63946;
      color: #fff;
      font-size: 1.5rem;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.1em;
    }
    a.play:hover { background: #c0303c; }
    footer { position: fixed; bottom: 1rem; color: #333; font-size: 0.75rem; }
  </style>
</head>
<body>
  <h1>TURNS</h1>
  <p>1v1 roguelite shooter. Steal cards. Escalate mayhem.</p>
  <a class="play" href="turns/">PLAY</a>
  <footer>Browser fan remake. Original ROUNDS by Landfall Games (Wilhelm Nylund). Not affiliated.</footer>
</body>
</html>
