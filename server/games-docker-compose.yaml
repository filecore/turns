version: '3'
services:
  nginx-subdomain-togneri-games:
    image: nginx
    ports:
      - '36008:80'
    volumes:
      - ./www-data:/usr/share/nginx/html
      - ./conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.togneri-games.rule=Host(`games.togneri.net`)"
      - "traefik.http.routers.togneri-games.entrypoints=websecure"
      - "traefik.http.routers.togneri-games.tls.certresolver=cloudflare"
      - "traefik.http.services.togneri-games.loadbalancer.server.port=80"
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - default
      - reverse-proxy

  turns-relay:
    build: ./relay
    restart: unless-stopped
    networks:
      - default

networks:
  default: {}
  reverse-proxy:
    external: true
