server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache JS/CSS — always re-validate with the server
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Turns relay WebSocket proxy
    location /turns-relay {
        proxy_pass http://turns-relay:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    # Conqueror moved to its own subdomain
    location ^~ /games/conqueror {
        return 301 https://treads.togneri.net/;
    }

    # Redirect /games index to root portal
    location = /games {
        return 301 /;
    }
    location = /games/ {
        return 301 /;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
